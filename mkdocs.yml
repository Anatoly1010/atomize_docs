site_name: Atomize Docs
site_url: https://anatoly1010.github.io/atomize_docs/
site_description: Atomize software documentation
repo_url: https://github.com/Anatoly1010/Atomize
repo_name: Anatoly1010/Atomize

docs_dir: mkdocs_poc

theme:
  name: material
  logo: images/Atomize-mark.svg
  favicon: images/Atomize-mark.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Requirements: requirements.md
  - Usage: usage.md
  - Instruments: instruments.md
  - Protocol settings: protocol_settings.md
  - Writing modules: writing_modules.md
  - Documentation:
      - Arbitrary Waveform Generators: functions/awg.md
      - Delay Generators: functions/delay_generator.md
      - Digitizers: functions/digitizer.md
      - Frequency Counters: functions/freq_counter.md
      - Gaussmeters: functions/gaussmeter.md
      - Laser Power Meters: functions/laser_power_meter.md
      - Lock-In Amplifiers: functions/lock_in.md
      - Magnetic Field Controllers: functions/magnet.md
      - Magnet Power Supplies: functions/magnet_power_supply.md
      - Microwave Bridges: functions/microwave_bridge.md
      - Moisture Meters: functions/moisture_meter.md
      - Oscilloscopes: functions/oscilloscope.md
      - Other Devices: functions/other_device.md
      - Power Supplies: functions/power_supply.md
      - Pulse Programmers: functions/pulse_programmer.md
      - Synthetizers: functions/synthetizer.md
      - Temperature Controllers: functions/temp_controller.md
      - Vector Network Analyzers: functions/vector_network_analyzer.md
      - Waveform Generators: functions/wave_generator.md
      - General Functions:
          - Overview: functions/general_functions/index.md
          - Functions: functions/general_functions/general_functions.md
          - Data Management: functions/general_functions/data_managment.md
          - Concurrency: functions/general_functions/concurrency.md
          - Examples: functions/general_functions/examples.md
      - Plotting Functions:
          - Overview: functions/plotting_functions/index.md
          - Usage: functions/plotting_functions/usage.md
          - Examples: functions/plotting_functions/examples.md
  - Projects:
      - X-band pulsed EPR: projects/xband.md
      - Q-band pulsed EPR: projects/qband.md
      - EPR endstation: projects/endstation.md
  - Examples:
      - CW EPR: script_examples/cw_epr.md
  - Contributors: contributors.md
