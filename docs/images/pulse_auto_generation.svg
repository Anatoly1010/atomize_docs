     y="344"
     font-size="13"
     font-weight="bold"
     id="text36"
     style="font-weight:bold;font-size:13px;text-anchor:end;fill:#333333">±x / ±y</text>
  <!-- MW pulse (reference): 380 .. 560 -->
  <rect
     x="380"
     y="80"
     width="180"
     height="34"
     rx="2"
     id="rect38"
     style="fill:#3949ab;stroke:#283593;stroke-width:1.5" />
  <!-- AMP_ON: start - 170 .. end - 60  =>  210 .. 500 -->
  <rect
     x="210"
     y="162"
     width="290"
     height="34"
     rx="2"
     id="rect40"
     style="fill:#f0b429;stroke:#c79214;stroke-width:1.5" />
  <!-- LNA_PROTECT: start - 170 .. end + 40  =>  210 .. 600 -->
  <rect
     x="210"
     y="244"
     width="390"
     height="34"
     rx="2"
     id="rect42"
     style="fill:#e05a4c;stroke:#b23a2e;stroke-width:1.5" />
  <!-- Phase (+/-x, +/-y): start - 30 .. end + 0  =>  350 .. 560 -->
  <rect
     x="350"
     y="326"
     width="210"
     height="34"
     rx="2"
     id="rect44"
     style="fill:#2fa37a;stroke:#1f7d5c;stroke-width:1.5" />
  <!-- lead guide at x=210 (AMP_ON / LNA_PROTECT start) -->
  <!-- phase start guide at x=350 -->
  <!-- AMP_ON / LNA_PROTECT lead measure: 210 -> 380 -->
  <line
     x1="210.88031"
     y1="141.00014"
     x2="378.74466"
     y2="141.00014"
     id="line50"
     style="stroke:#555555;stroke-width:0.99369889;marker-start:url(#arrStart);marker-end:url(#arrEnd)" />
  <text
     x="295"
     y="135.00014"
     font-size="11"
     id="text52"
     style="font-size:11px;text-anchor:middle;fill:#444444">switch_amp_delay = switch_protect_delay = 170 ns</text>
  <!-- amp_delay (negative): 560 -> 500 -->
  <line
     x1="560"
     y1="141.00014"
     x2="500"
     y2="141.00014"
     id="line54"
     style="stroke:#555555;stroke-width:1;marker-end:url(#arrEnd)" />
  <text
     x="584"
     y="145.00014"
     font-size="11"
     id="text56"
     style="font-size:11px;text-anchor:start;fill:#444444">amp_delay = −60 ns</text>
  <!-- protect_delay: 560 -> 600 -->
  <line
     x1="560"
     y1="226"
     x2="600"
     y2="226"
     id="line58"
     style="stroke:#555555;stroke-width:1;marker-end:url(#arrEnd)" />
  <text
     x="606"
     y="230"
     font-size="11"
     id="text60"
     style="font-size:11px;text-anchor:start;fill:#444444">protect_delay = 40 ns</text>
  <!-- phase lead: 350 -> 380 -->
  <line
     x1="350"
     y1="310"
