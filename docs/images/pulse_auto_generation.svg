     y="314"
     font-size="11"
     id="text64"
     style="font-size:11px;text-anchor:end;fill:#444444">switch_phase_delay = 30 ns</text>
  <!-- phase_delay note -->
  <text
     x="566"
     y="320"
     font-size="11"
     id="text66"
     style="font-size:11px;text-anchor:start;fill:#444444">phase_delay = 0 ns</text>
